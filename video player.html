<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پخش‌کننده ویدیوی پیشرفته</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0b0b, #1a1a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 1rem;
        }

        .player-wrapper {
            background: #1e1e1e;
            border-radius: 2rem;
            padding: 2rem 1.5rem 1.8rem;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px #3a3a3a inset;
            max-width: 850px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 1.2rem;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
        }

        #videoPlayer {
            width: 100%;
            display: block;
            height: auto;
            aspect-ratio: 16 / 9;
            background: #0f0f0f;
            cursor: pointer;
        }

        /* کنترل‌های سفارشی */
        .custom-controls {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(8px);
            padding: 0.6rem 1.2rem 0.8rem;
            border-radius: 3rem;
            margin-top: -1.8rem;
            margin-left: 0.5rem;
            margin-right: 0.5rem;
            position: relative;
            z-index: 5;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.5rem 0.8rem;
            border: 1px solid #3f3f3f;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
        }

        .control-btn {
            background: transparent;
            border: none;
            color: #e0e0e0;
            font-size: 1.1rem;
            padding: 0.2rem 0.5rem;
            border-radius: 2rem;
            transition: 0.15s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.4rem;
            height: 2.4rem;
        }

        .control-btn:hover {
            background: #3a3a3a;
            color: #fff;
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.92);
        }

        .control-btn.active-btn {
            color: #ffb347;
        }

        .progress-container {
            flex: 2 1 200px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            min-width: 140px;
        }

        .progress-bar {
            flex: 1;
            height: 5px;
            background: #4a4a4a;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: height 0.1s;
        }

        .progress-bar:hover {
            height: 7px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            border-radius: 10px;
            display: block;
            transition: width 0.05s linear;
        }

        .time-display {
            color: #ccc;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            min-width: 80px;
            text-align: center;
            background: #2c2c2c;
            padding: 0.15rem 0.6rem;
            border-radius: 20px;
        }

        .speed-selector {
            background: #2a2a2a;
            color: #ddd;
            border: 1px solid #4a4a4a;
            border-radius: 2rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            transition: 0.15s;
        }

        .speed-selector:hover {
            background: #3d3d3d;
            border-color: #f7971e;
        }

        .file-upload-wrapper {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .file-label {
            background: #2d2d2d;
            color: #ddd;
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #4a4a4a;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .file-label:hover {
            background: #3f3f3f;
            border-color: #f7971e;
            color: #fff;
        }

        #fileInput {
            display: none;
        }

        .volume-box {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .volume-slider {
            width: 60px;
            height: 4px;
            background: #4a4a4a;
            border-radius: 10px;
            -webkit-appearance: none;
            appearance: none;
            outline: none;
            transition: 0.2s;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f7971e;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 6px rgba(247, 151, 30, 0.5);
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f7971e;
            cursor: pointer;
            border: 2px solid #fff;
        }

        .fullscreen-btn {
            font-size: 1.2rem;
        }

        /* responsive */
        @media (max-width: 650px) {
            .player-wrapper {
                padding: 1rem 0.8rem 1.2rem;
            }
            .custom-controls {
                gap: 0.3rem;
                padding: 0.4rem 0.6rem;
                border-radius: 2rem;
                margin-top: -1.2rem;
            }
            .control-btn {
                width: 2rem;
                height: 2rem;
                font-size: 0.9rem;
            }
            .volume-slider {
                width: 40px;
            }
            .time-display {
                font-size: 0.65rem;
                min-width: 65px;
            }
            .file-label {
                font-size: 0.7rem;
                padding: 0.15rem 0.7rem;
            }
            .speed-selector {
                font-size: 0.7rem;
                padding: 0.1rem 0.4rem;
            }
        }
    </style>
</head>
<body>

<div class="player-wrapper">
    <div class="video-container">
        <!-- ویدیو -->
        <video id="videoPlayer" preload="metadata" playsinline>
            <source src="" type="video/mp4">
            مرورگر شما از تگ ویدیو پشتیبانی نمی‌کند.
        </video>
    </div>

    <!-- کنترل‌های سفارشی -->
    <div class="custom-controls">
        <!-- دکمه پخش/مکث -->
        <button class="control-btn" id="playPauseBtn" title="پخش/مکث">
            <i class="fas fa-play" id="playIcon"></i>
        </button>

        <!-- دکمه قطع صدا -->
        <button class="control-btn" id="muteBtn" title="قطع/اتصال صدا">
            <i class="fas fa-volume-up" id="muteIcon"></i>
        </button>

        <!-- کنترل صدا -->
        <div class="volume-box">
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
        </div>

        <!-- زمان -->
        <div class="time-display" id="timeDisplay">00:00 / 00:00</div>

        <!-- نوار پیشرفت -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <span class="progress-fill" id="progressFill"></span>
            </div>
        </div>

        <!-- انتخاب سرعت -->
        <select class="speed-selector" id="speedSelector">
            <option value="0.5">0.5×</option>
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
        </select>

        <!-- انتخاب فایل -->
        <div class="file-upload-wrapper">
            <label for="fileInput" class="file-label">
                <i class="fas fa-folder-open"></i> انتخاب
            </label>
            <input type="file" id="fileInput" accept="video/*">
        </div>

        <!-- تمام صفحه -->
        <button class="control-btn fullscreen-btn" id="fullscreenBtn" title="تمام صفحه">
            <i class="fas fa-expand"></i>
        </button>
    </div>
</div>

<script>
    (function() {
        // عناصر
        const video = document.getElementById('videoPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const muteBtn = document.getElementById('muteBtn');
        const muteIcon = document.getElementById('muteIcon');
        const volumeSlider = document.getElementById('volumeSlider');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const speedSelector = document.getElementById('speedSelector');
        const fileInput = document.getElementById('fileInput');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // وضعیت‌ها
        let isDragging = false;

        // ------------------- helper functions -------------------
        function formatTime(seconds) {
            if (isNaN(seconds) || seconds < 0) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            if (!isDragging) {
                const percent = (video.currentTime / video.duration) * 100 || 0;
                progressFill.style.width = percent + '%';
            }
            // آپدیت زمان
            const current = formatTime(video.currentTime);
            const total = formatTime(video.duration);
            timeDisplay.textContent = `${current} / ${total}`;
        }

        // ------------------- رویدادهای ویدیو -------------------
        video.addEventListener('loadedmetadata', updateProgress);
        video.addEventListener('timeupdate', updateProgress);
        video.addEventListener('play', () => {
            playIcon.classList.remove('fa-play');
            playIcon.classList.add('fa-pause');
        });
        video.addEventListener('pause', () => {
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play');
        });
        video.addEventListener('volumechange', () => {
            // هماهنگ‌سازی اسلایدر و آیکون
            volumeSlider.value = video.volume;
            if (video.muted) {
                muteIcon.classList.remove('fa-volume-up', 'fa-volume-down', 'fa-volume-off');
                muteIcon.classList.add('fa-volume-mute');
            } else {
                if (video.volume > 0.5) {
                    muteIcon.classList.remove('fa-volume-mute', 'fa-volume-down', 'fa-volume-off');
                    muteIcon.classList.add('fa-volume-up');
                } else if (video.volume > 0) {
                    muteIcon.classList.remove('fa-volume-mute', 'fa-volume-up', 'fa-volume-off');
                    muteIcon.classList.add('fa-volume-down');
                } else {
                    muteIcon.classList.remove('fa-volume-mute', 'fa-volume-up', 'fa-volume-down');
                    muteIcon.classList.add('fa-volume-off');
                }
            }
        });

        // وقتی ویدیو تمام شد
        video.addEventListener('ended', () => {
            playIcon.classList.remove('fa-pause');
            playIcon.classList.add('fa-play');
        });

        // ------------------- کنترل‌ها -------------------
        // پخش/مکث
        playPauseBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
        });

        // کلیک روی ویدیو هم پخش/مکث
        video.addEventListener('click', () => {
            if (video.paused) {
                video.play().catch(() => {});
            } else {
                video.pause();
            }
        });

        // قطع صدا
        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
        });

        // اسلایدر صدا
        volumeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            video.volume = val;
            video.muted = (val === 0);
        });

        // نوار پیشرفت (کلیک و درگ)
        progressBar.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = progressBar.getBoundingClientRect();
            const x = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            video.currentTime = x * video.duration;
            progressFill.style.width = (x * 100) + '%';
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = progressBar.getBoundingClientRect();
                const x = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
                video.currentTime = x * video.duration;
                progressFill.style.width = (x * 100) + '%';
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                updateProgress();
            }
        });

        // پشتیبانی لمسی برای موبایل
        progressBar.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            const rect = progressBar.getBoundingClientRect();
            const touch = e.touches[0];
            const x = Math.min(1, Math.max(0, (touch.clientX - rect.left) / rect.width));
            video.currentTime = x * video.duration;
            progressFill.style.width = (x * 100) + '%';
        }, { passive: false });

        progressBar.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const rect = progressBar.getBoundingClientRect();
                const touch = e.touches[0];
                const x = Math.min(1, Math.max(0, (touch.clientX - rect.left) / rect.width));
                video.currentTime = x * video.duration;
                progressFill.style.width = (x * 100) + '%';
            }
        }, { passive: false });

        progressBar.addEventListener('touchend', () => {
            isDragging = false;
            updateProgress();
        });

        // انتخاب سرعت
        speedSelector.addEventListener('change', (e) => {
            video.playbackRate = parseFloat(e.target.value);
        });

        // انتخاب فایل از کامپیوتر
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const url = URL.createObjectURL(file);
            video.src = url;
            video.load();
            video.play().catch(() => {});
            // ریست آیکون پلی
            playIcon.classList.remove('fa-play');
            playIcon.classList.add('fa-pause');
            // آپدیت نمایش
            updateProgress();
        });

        // تمام صفحه
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen?.() || 
                document.documentElement.webkitRequestFullscreen?.();
            } else {
                document.exitFullscreen?.() || 
                document.webkitExitFullscreen?.();
            }
        });

        // دکمه کیبورد Space برای پخش/مکث
        document.addEventListener('keydown', (e) => {
            if (e.target === document.body && e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                if (video.paused) {
                    video.play().catch(() => {});
                } else {
                    video.pause();
                }
            }
        });

        // تنظیم اولیه (یک ویدیو نمونه برای تست - می‌توانید حذف کنید)
        // برای اینکه صفحه خالی نباشد، یک ویدیو نمونه از اینترنت قرار نمی‌دهیم تا کاربر خودش انتخاب کند.
        // ولی اگر خواستید تست کنید، می‌توانید یک فایل نمونه از مسیر relative بگذارید.
        // مثلاً: video.src = "sample.mp4"; 
        // (فعلاً خالی می‌گذاریم تا کاربر فایل را انتخاب کند)

        // در صورت عدم وجود ویدیو، پیام نشان می‌دهیم
        video.poster = ''; 
        // اگر ویدیو منبع نداشت، یک پیام در videoContainer نشان می‌دهیم (اختیاری)
        // فقط برای راهنمایی کاربر
        if (!video.src || video.src === '') {
            // یک متن راهنما داخل ویدیو (با استفاده از textContent)
            // ولی ترجیح می‌دهیم که کاربر با دکمه انتخاب فایل، ویدیو را انتخاب کند.
        }

        // غیرفعال کردن منوی راست‌کلیک روی ویدیو (اختیاری)
        video.addEventListener('contextmenu', (e) => e.preventDefault());

        console.log('ویدیو پلیر آماده است! یک فایل ویدیویی انتخاب کنید.');
    })();
</script>

</body>
</html>
